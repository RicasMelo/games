<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cards Game</title>

    <style>
        * {
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #141e30, #243b55);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
        }

        .screen {
            width: 100%;
            max-width: 850px;
            text-align: center;
        }

        .box {
            background: rgba(255, 255, 255, 0.09);
            padding: 32px;
            border-radius: 24px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(12px);
        }

        input {
            width: 100%;
            max-width: 350px;
            padding: 15px;
            border-radius: 12px;
            border: none;
            font-size: 16px;
            margin: 15px 0;
        }

        button {
            padding: 14px 22px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            background: linear-gradient(to right, #0072ff, #00c6ff);
            color: white;
            margin: 8px;
            transition: 0.2s;
        }

        button:hover {
            transform: scale(1.04);
        }

        .hidden {
            display: none;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
            gap: 18px;
            margin-top: 25px;
        }

        .card {
            min-height: 140px;
            padding: 22px;
            border-radius: 18px;
            background: white;
            color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.25);
        }

        .black-card {
            background: #111;
            color: white;
        }

        .clickable {
            cursor: pointer;
        }

        .clickable:hover {
            transform: translateY(-5px) scale(1.02);
        }

        .status {
            margin-top: 18px;
            color: #ffd369;
        }

        .reveal-card {
            margin-top: 25px;
            padding: 30px;
            border-radius: 22px;
            background: white;
            color: #111;
            font-size: 24px;
            font-weight: bold;
            animation: pop 0.4s ease;
        }

        @keyframes pop {
            from {
                opacity: 0;
                transform: scale(0.9);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .winner {
            color: #00ffae;
            font-size: 26px;
            margin-top: 25px;
        }
    </style>
</head>

<body>

    <div id="nameScreen" class="screen box">
        <h1>Select your username</h1>
        <input id="usernameInput" placeholder="Username" maxlength="20" />
        <br />
        <button id="joinBtn">Join Game</button>
        <p id="nameMessage" class="status"></p>
    </div>

    <div id="gameScreen" class="screen box hidden">
        <h2 id="playerDisplay"></h2>

        <div id="chooserSection">
            <h2>Waiting for a prompt chooser</h2>
            <button id="bePromptChooserBtn">Become Prompt Chooser</button>
        </div>

        <div id="promptSection" class="hidden">
            <h2>Prompt cards</h2>
            <p id="promptInfo"></p>
            <div id="promptCards" class="cards"></div>
        </div>

        <div id="responseSection" class="hidden">
            <h2>Prompt</h2>
            <div id="publicPrompt" class="card black-card"></div>

            <h2>Response cards</h2>
            <div id="responseCards" class="cards"></div>
        </div>

        <div id="waitingSection" class="hidden">
            <h2 id="waitingText">Waiting...</h2>
        </div>

        <div id="revealSection" class="hidden">
            <h2>Revealing answers</h2>
            <div id="revealPrompt" class="card black-card"></div>
            <div id="revealResponse"></div>
            <div id="winnerButtons" class="cards"></div>
            <button id="nextRevealBtn" class="hidden">Show Next Response</button>
        </div>

        <div id="winnerSection" class="hidden">
            <h2 class="winner" id="winnerText"></h2>
            <button id="playAgainBtn" class="hidden">Play Again</button>
        </div>

        <p id="gameMessage" class="status"></p>
    </div>

    <script type="module">
        import { initializeApp }
            from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

        import {
            getDatabase,
            ref,
            set,
            update,
            onValue,
            get,
            remove
        }
            from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB6bbntbA1neFXQQgntP-rJUJK_bevSw2g",
            authDomain: "ricagames.firebaseapp.com",
            databaseURL: "https://ricagames-default-rtdb.firebaseio.com",
            projectId: "ricagames",
            storageBucket: "ricagames.firebasestorage.app",
            messagingSenderId: "892798133679",
            appId: "1:892798133679:web:164320be2bc582a3153b5a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const GAME_ID = "Game1";

        let username = localStorage.getItem("username") || "";
        let revealStarted = false;

        const prompts = [
            "Why can't I sleep at night?",
            "What ended my last relationship?",
            "What's that smell?",
            "What is Batman's guilty pleasure?",
            "What never fails to liven up the party?",
            "What's my secret power?"
        ];

        const responses = [
            "A suspicious amount of cheese.",
            "The entire Portuguese tax system.",
            "A very confused pigeon.",
            "Grandma's forbidden soup.",
            "An unpaid internship.",
            "A dramatic entrance.",
            "Too much confidence.",
            "A PowerPoint presentation nobody asked for.",
            "One aggressively medium potato.",
            "A surprisingly emotional toaster."
        ];

        const nameScreen = document.getElementById("nameScreen");
        const gameScreen = document.getElementById("gameScreen");
        const usernameInput = document.getElementById("usernameInput");
        const joinBtn = document.getElementById("joinBtn");
        const nameMessage = document.getElementById("nameMessage");

        const playerDisplay = document.getElementById("playerDisplay");
        const chooserSection = document.getElementById("chooserSection");
        const promptSection = document.getElementById("promptSection");
        const responseSection = document.getElementById("responseSection");
        const waitingSection = document.getElementById("waitingSection");
        const revealSection = document.getElementById("revealSection");
        const winnerSection = document.getElementById("winnerSection");

        const bePromptChooserBtn = document.getElementById("bePromptChooserBtn");
        const promptCards = document.getElementById("promptCards");
        const responseCards = document.getElementById("responseCards");
        const publicPrompt = document.getElementById("publicPrompt");
        const promptInfo = document.getElementById("promptInfo");
        const waitingText = document.getElementById("waitingText");

        const revealPrompt = document.getElementById("revealPrompt");
        const revealResponse = document.getElementById("revealResponse");
        const winnerButtons = document.getElementById("winnerButtons");
        const nextRevealBtn = document.getElementById("nextRevealBtn");

        const winnerText = document.getElementById("winnerText");
        const playAgainBtn = document.getElementById("playAgainBtn");
        const gameMessage = document.getElementById("gameMessage");

        if (username) {
            showGameScreen();

            set(ref(db, `${GAME_ID}/Players/${username}`), {
                username,
                ready: false,
                score: 0,
                vote: 0,
                role: "waiting"
            });
        }

        joinBtn.addEventListener("click", async () => {
            const chosenName = usernameInput.value.trim();

            if (chosenName.length < 3) {
                nameMessage.textContent = "Username must be at least 3 characters.";
                return;
            }

            username = chosenName;

            await set(ref(db, `${GAME_ID}/Players/${username}`), {
                username,
                ready: false,
                score: 0,
                vote: 0,
                role: "waiting"
            });

            localStorage.setItem("username", username);
            localStorage.setItem("gameId", GAME_ID);

            showGameScreen();
        });

        function showGameScreen() {
            nameScreen.classList.add("hidden");
            gameScreen.classList.remove("hidden");
            playerDisplay.textContent = `Player: ${username}`;
        }

        function hideGameSections() {
            chooserSection.classList.add("hidden");
            promptSection.classList.add("hidden");
            responseSection.classList.add("hidden");
            waitingSection.classList.add("hidden");
            revealSection.classList.add("hidden");
            winnerSection.classList.add("hidden");
            winnerButtons.innerHTML = "";
        }

        function drawRandomCards(array, amount) {
            return [...array].sort(() => Math.random() - 0.5).slice(0, amount);
        }

        bePromptChooserBtn.addEventListener("click", async () => {
            const stateSnap = await get(ref(db, `${GAME_ID}/State`));
            const currentState = stateSnap.val();

            if (currentState && currentState.promptChooser) {
                gameMessage.textContent = "A prompt chooser already exists.";
                return;
            }

            await remove(ref(db, `${GAME_ID}/Submissions`));

            await update(ref(db, `${GAME_ID}/State`), {
                phase: "choosingPrompt",
                promptChooser: username,
                prompt: "",
                winner: ""
            });

            const playersSnap = await get(ref(db, `${GAME_ID}/Players`));
            const players = playersSnap.val() || {};

            for (const playerName in players) {
                await update(ref(db, `${GAME_ID}/Players/${playerName}`), {
                    role: playerName === username ? "promptChooser" : "responseChooser",
                    ready: playerName === username
                });
            }
        });

        onValue(ref(db, `${GAME_ID}/State`), async snapshot => {
            const state = snapshot.val();

            if (!username) return;

            hideGameSections();

            if (!state) {
                chooserSection.classList.remove("hidden");
                return;
            }

            if (state.phase === "waiting") {
                chooserSection.classList.remove("hidden");
            }

            if (state.phase === "choosingPrompt") {
                showPromptPhase(state);
            }

            if (state.phase === "choosingResponses") {
                showResponsePhase(state);
            }

            if (state.phase === "revealing") {
                showRevealPhase(state);
            }

            if (state.phase === "winnerChosen") {
                showWinnerPhase(state);
            }
        });

        function showPromptPhase(state) {
            promptSection.classList.remove("hidden");
            promptCards.innerHTML = "";

            if (state.promptChooser === username) {
                promptInfo.textContent = "You are the prompt chooser. Select one prompt.";

                const drawnPrompts = drawRandomCards(prompts, 4);

                drawnPrompts.forEach(prompt => {
                    const card = document.createElement("div");
                    card.className = "card black-card clickable";
                    card.textContent = prompt;

                    card.addEventListener("click", async () => {
                        await update(ref(db, `${GAME_ID}/State`), {
                            phase: "choosingResponses",
                            prompt
                        });
                    });

                    promptCards.appendChild(card);
                });
            } else {
                promptInfo.textContent = `${state.promptChooser} is choosing the prompt.`;
                const waitCard = document.createElement("div");
                waitCard.className = "card black-card";
                waitCard.textContent = "Waiting for prompt...";
                promptCards.appendChild(waitCard);
            }
        }

        async function showResponsePhase(state) {
            publicPrompt.textContent = state.prompt;

            const playerSnap = await get(ref(db, `${GAME_ID}/Players/${username}`));
            const player = playerSnap.val();

            if (player.role === "promptChooser") {
                waitingSection.classList.remove("hidden");
                waitingText.textContent = "Waiting for players to submit responses...";
                checkAllSubmitted();
                return;
            }

            if (player.ready) {
                waitingSection.classList.remove("hidden");
                waitingText.textContent = "Response submitted. Waiting for others...";
                return;
            }

            responseSection.classList.remove("hidden");
            responseCards.innerHTML = "";

            const drawnResponses = drawRandomCards(responses, 4);

            drawnResponses.forEach(response => {
                const card = document.createElement("div");
                card.className = "card clickable";
                card.textContent = response;

                card.addEventListener("click", async () => {
                    await set(ref(db, `${GAME_ID}/Submissions/${username}`), {
                        username,
                        response
                    });

                    await update(ref(db, `${GAME_ID}/Players/${username}`), {
                        ready: true
                    });

                    checkAllSubmitted();
                });

                responseCards.appendChild(card);
            });
        }

        onValue(ref(db, `${GAME_ID}/Players`), () => {
            checkAllSubmitted();
        });

        async function checkAllSubmitted() {
            const stateSnap = await get(ref(db, `${GAME_ID}/State`));
            const state = stateSnap.val();

            if (!state || state.phase !== "choosingResponses") return;

            const playersSnap = await get(ref(db, `${GAME_ID}/Players`));
            const players = playersSnap.val() || {};

            const responsePlayers = Object.values(players)
                .filter(player => player.role === "responseChooser");

            if (responsePlayers.length === 0) return;

            const allReady = responsePlayers.every(player => player.ready === true);

            if (allReady) {
                const submissionsSnap = await get(ref(db, `${GAME_ID}/Submissions`));
                const submissions = submissionsSnap.val() || {};
                const submissionList = Object.values(submissions);

                await update(ref(db, `${GAME_ID}/State`), {
                    phase: "revealing",
                    revealIndex: 0,
                    revealTotal: submissionList.length
                });
            }
        }

        async function showRevealPhase(state) {
            revealSection.classList.remove("hidden");
            revealPrompt.textContent = state.prompt;

            const submissionsSnap = await get(ref(db, `${GAME_ID}/Submissions`));
            const submissions = submissionsSnap.val() || {};
            const submissionList = Object.values(submissions);

            winnerButtons.innerHTML = "";

            const currentIndex = state.revealIndex || 0;
            const currentSubmission = submissionList[currentIndex];

            if (!currentSubmission) {
                revealResponse.innerHTML = `
      <div class="reveal-card">
        All responses revealed.
      </div>
    `;

                nextRevealBtn.classList.add("hidden");

                if (state.promptChooser === username) {
                    showWinnerButtons(submissionList);
                }

                return;
            }

            revealResponse.innerHTML = `
    <div class="reveal-card">
      <small>${currentSubmission.username}</small>
      <br><br>
      ${currentSubmission.response}
    </div>
  `;

            if (state.promptChooser === username) {
                nextRevealBtn.classList.remove("hidden");
            } else {
                nextRevealBtn.classList.add("hidden");
            }

            nextRevealBtn.onclick = async () => {
                const nextIndex = currentIndex + 1;

                await update(ref(db, `${GAME_ID}/State`), {
                    revealIndex: nextIndex
                });
            };
        }

        function showWinnerButtons(submissionList) {
            winnerButtons.innerHTML = "";
            nextRevealBtn.classList.add("hidden");

            submissionList.forEach(submission => {
                const btn = document.createElement("button");
                btn.textContent = `Choose ${submission.username}`;

                btn.addEventListener("click", async () => {
                    const playerSnap = await get(ref(db, `${GAME_ID}/Players/${submission.username}`));
                    const player = playerSnap.val() || {};
                    const currentScore = player.score || 0;

                    await update(ref(db, `${GAME_ID}/Players/${submission.username}`), {
                        score: currentScore + 1
                    });

                    await update(ref(db, `${GAME_ID}/State`), {
                        phase: "winnerChosen",
                        winner: submission.username
                    });
                });

                winnerButtons.appendChild(btn);
            });
        }

        function showWinnerPhase(state) {
            winnerSection.classList.remove("hidden");
            winnerText.textContent = `${state.winner} wins this round.`;

            if (state.promptChooser === username) {
                playAgainBtn.classList.remove("hidden");
            } else {
                playAgainBtn.classList.add("hidden");
            }
        }

        playAgainBtn.addEventListener("click", async () => {
            const playersSnap = await get(ref(db, `${GAME_ID}/Players`));
            const oldPlayers = playersSnap.val() || {};

            const playerNames = Object.keys(oldPlayers);

            await remove(ref(db, GAME_ID));

            for (const playerName of playerNames) {
                const oldPlayer = oldPlayers[playerName];

                await set(ref(db, `${GAME_ID}/Players/${playerName}`), {
                    username: playerName,
                    ready: false,
                    score: oldPlayer.score || 0,
                    vote: 0,
                    role: "waiting"
                });
            }

            revealStarted = false;

            await update(ref(db, `${GAME_ID}/State`), {
                phase: "waiting",
                promptChooser: "",
                prompt: "",
                winner: "",
                revealIndex: 0
            });
        });

        function wait(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }
    </script>

</body>

</html>
