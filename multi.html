<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register Player</title>
</head>

<body>
    <h1>Select your username:</h1>

    <input id="usernameInput" type="text" placeholder="Username" />
    <button id="submitBtn">Submit</button>

    <p id="message"></p>

    <script type="module">
        import { initializeApp } from "firebase/app";
        import {
            getDatabase,
            ref,
            set
        } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB6bbntbA1neFXQQgntP-rJUJK_bevSw2g",
            authDomain: "ricagames.firebaseapp.com",
            databaseURL: "https://ricagames-default-rtdb.firebaseio.com",
            projectId: "ricagames",
            storageBucket: "ricagames.firebasestorage.app",
            messagingSenderId: "892798133679",
            appId: "1:892798133679:web:164320be2bc582a3153b5a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const usernameInput = document.getElementById("usernameInput");
        const submitBtn = document.getElementById("submitBtn");
        const message = document.getElementById("message");

        submitBtn.addEventListener("click", async () => {
            const username = usernameInput.value.trim();

            if (username.length < 3) {
                message.textContent = "Username must be at least 3 characters long.";
                return;
            }

            try {
                await set(ref(db, "Players/" + username), {
                    username: username,
                    ready: false,
                    score: 0,
                    vote: 0
                });

                message.textContent = "Player registered successfully.";
                usernameInput.value = "";
            } catch (error) {
                console.error(error);
                message.textContent = "Error registering player.";
            }
        });
    </script>
</body>

</html>
